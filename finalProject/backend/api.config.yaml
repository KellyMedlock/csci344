# Sample API: campus fruit trees and bushes
# Copy this file to the project root as api.config.yaml (backup the default first if you want).

resources:
  - type: Character
    path: /api/characters
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: character_name
        type: string
        required: true
        query: true
      - name: class_dnd
        type: string
        required: true
      - name: subclass_dnd
        type: string
      - name: race
        type: string
        required: true
      - name: subrace
        type: string
      - name: background
        type: string
        required: true
      - name: level
        type: integer
        required: true
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner

  - type: Favorite
    path: /api/favorites
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: character
        type: Character
        required: true
    permissions:
      list: owner
      retrieve: owner
      create: user
      update: owner
      delete: owner
      