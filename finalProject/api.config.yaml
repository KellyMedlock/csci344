resources:
  - type: Character
    path: /api/characters
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: character_name
        type: string
        required: true
        query: true
      - name: class
        type: string
        required: true
      - name: subclass
        type: string
        required: true
      - name: race
        type: string
        required: true
      - name: background
        type: string
        required: true
      - name: user
        type: integer
        required: true
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner

  - type: Favorite
    path: /api/favorites
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: user
        type: integer
        required: true
      - name: character
        type: Character
        required: true
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner
      